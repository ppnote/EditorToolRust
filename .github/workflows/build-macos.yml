name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Package .app
        run: bash build-macos.sh

      - name: Create zip
        run: |
          cd dist
          zip -r ../EditorTool-macos.zip EditorTool.app editor-tool-rust

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EditorTool-macos
          path: EditorTool-macos.zip
          if-no-files-found: error

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: macos-${{ github.run_number }}
          name: macOS 构建 #${{ github.run_number }}
          body: |
            自动构建的 macOS 版本。

            下载 **EditorTool-macos.zip** 并解压：
            - `editor-tool-rust` — 终端可执行文件
            - `EditorTool.app` — 双击运行的应用程序

            ```bash
            chmod +x editor-tool-rust
            ./editor-tool-rust
            ```
          files: EditorTool-macos.zip
          make_latest: true
